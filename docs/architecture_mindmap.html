<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Palantir 架构思维导图</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: #0d0f1a;
    color: #e2e8f0;
    height: 100vh;
    overflow: hidden;
  }
  #toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(26,29,46,0.92);
    border-bottom: 1px solid #2d3748;
    backdrop-filter: blur(8px);
    padding: 10px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #toolbar .title { font-size: 14px; font-weight: 600; color: #a78bfa; }
  #toolbar .subtitle { font-size: 11px; color: #64748b; margin-top: 1px; }
  #toolbar .controls { display: flex; gap: 8px; }
  .tb-btn {
    background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.25);
    color: #a78bfa; border-radius: 6px; padding: 5px 12px; font-size: 12px;
    cursor: pointer; transition: background 0.15s;
  }
  .tb-btn:hover { background: rgba(167,139,250,0.2); }
  #canvas-wrap {
    position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
    overflow: hidden; cursor: grab;
  }
  #canvas-wrap.dragging { cursor: grabbing; }
  svg { width: 100%; height: 100%; }

  /* Node styles */
  .node-root circle   { fill: #a78bfa; }
  .node-root text     { fill: #0f1117; font-weight: 700; font-size: 15px; }

  .node-l1 rect       { rx: 8; }
  .node-l1 text       { font-weight: 600; font-size: 13px; }

  .node-l2 rect       { rx: 6; }
  .node-l2 text       { font-size: 12px; }

  .node-l3 text       { font-size: 11px; fill: #94a3b8; }

  .link { fill: none; stroke-width: 1.5; opacity: 0.5; }

  .badge {
    font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px;
  }
</style>
</head>
<body>

<div id="toolbar">
  <div>
    <div class="title">Palantir Ontology Platform — 架构全景</div>
    <div class="subtitle">从异构数据源 → Ontology Graph → 语义查询 → 决策执行</div>
  </div>
  <div class="controls">
    <button class="tb-btn" onclick="resetView()">重置视图</button>
    <button class="tb-btn" onclick="zoomIn()">＋</button>
    <button class="tb-btn" onclick="zoomOut()">－</button>

</div>

        { id: 'p2', label: 'connectors',          sub: 'path / headers / samples / mapping_config', color: '#374151' },
        { id: 'p3', label: 'live_entities',       sub: 'entity_type / ddd_concept / properties JSON', color: '#374151' },
        { id: 'p4', label: 'live_relationships',  sub: 'from_id / to_id / kind', color: '#374151' },

// ─── Layout ──────────────────────────────────────────────────────────────────
const CX = 2200, CY = 1600;   // canvas center
const ROOT_R = 80;

// Place children radially around root
function layout(node, x, y, angle, spread) {
  node.x = x;
  node.y = y;
  if (!node.children?.length) return;
  const n = node.children.length;
  const start = angle - spread / 2;
  const step  = spread / (n > 1 ? n - 1 : 1);
  const depth = getDepth(node);
  const radius = depth === 0 ? 360 : depth === 1 ? 280 : 200;
  node.children.forEach((child, i) => {
    const a = start + step * i;
    const rad = a * Math.PI / 180;
    const cx  = x + Math.cos(rad) * radius;
    const cy  = y + Math.sin(rad) * radius;
    const childSpread = Math.max(15, spread / Math.max(n, 2) * 1.1);
    layout(child, cx, cy, a, childSpread);
  });
}

function getDepth(node) {
  if (node.id === 'root') return 0;
  return 1; // top-level children of root
}

// Place root L1 nodes in a wide circle
const L1 = tree.children;
const L1_RADIUS = 600;
const L1_SPREAD = 50;
L1.forEach((child, i) => {
  const angle = (360 / L1.length) * i - 90;
  const rad   = angle * Math.PI / 180;
  child.x = CX + Math.cos(rad) * L1_RADIUS;
  child.y = CY + Math.sin(rad) * L1_RADIUS;
  tree.x  = CX;
  tree.y  = CY;
  if (child.children) {
    const n = child.children.length;
    const outAngle = angle;
    const spread   = 40;
    const start    = outAngle - (spread * (n - 1)) / 2;
    const R2 = 260;
    child.children.forEach((gc, j) => {
      const a2  = start + spread * j;
      const r2  = a2 * Math.PI / 180;
      gc.x = child.x + Math.cos(r2) * R2;
      gc.y = child.y + Math.sin(r2) * R2;
      if (gc.children) {
        const n2 = gc.children.length;
        const s2 = 30;
        const st2 = a2 - (s2 * (n2 - 1)) / 2;
        const R3 = 200;
        gc.children.forEach((ggc, k) => {
          const a3 = st2 + s2 * k;
          const r3 = a3 * Math.PI / 180;
          ggc.x = gc.x + Math.cos(r3) * R3;
          ggc.y = gc.y + Math.sin(r3) * R3;
        });
      }
    });
  }
});

// ─── Render ──────────────────────────────────────────────────────────────────
const svg  = document.getElementById('svg');
const g    = document.getElementById('root-g');
const NS   = 'http://www.w3.org/2000/svg';

function el(tag, attrs = {}, parent = g) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  parent.appendChild(e);
  return e;
}

function drawLink(x1, y1, x2, y2, color) {
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  el('path', {
    d: `M${x1},${y1} Q${mx},${y1} ${x2},${y2}`,
    stroke: color || '#4a5568',
    'stroke-width': 1.5,
    fill: 'none',
    opacity: 0.4,
  });
}

function drawNode(node, level) {
  if (level === 0) {
    // Root circle
    const circle = el('circle', { cx: node.x, cy: node.y, r: ROOT_R, fill: node.color });
    const lines = node.label.split('\n');
    lines.forEach((line, i) => {
      const t = el('text', {
        x: node.x, y: node.y + (i - (lines.length - 1) / 2) * 18,
        'text-anchor': 'middle', 'dominant-baseline': 'middle',
        fill: '#0f1117', 'font-weight': '700', 'font-size': '13px',
        'pointer-events': 'none',
      });
      t.textContent = line;
    });
    return;
  }

  // Box nodes
  const w = level === 1 ? 160 : level === 2 ? 150 : 170;
  const h = node.sub ? (level === 1 ? 52 : 44) : (level === 1 ? 36 : 30);
  const rx = 8;
  const alpha = level === 1 ? 'cc' : level === 2 ? '44' : '22';
  const border = level === 1 ? 'cc' : '66';

  // Background
  el('rect', {
    x: node.x - w/2, y: node.y - h/2, width: w, height: h, rx,
    fill: node.color + alpha,
    stroke: node.color + border,
    'stroke-width': level === 1 ? 1.5 : 1,
  });

  // Label
  el('text', {
    x: node.x, y: node.y - (node.sub ? 8 : 0),
    'text-anchor': 'middle', 'dominant-baseline': 'middle',
    fill: level === 1 ? '#e2e8f0' : '#cbd5e0',
    'font-size': level === 1 ? '12px' : '11px',
    'font-weight': level === 1 ? '600' : '400',
    'pointer-events': 'none',
  }).textContent = node.label;

  // Sub label
  if (node.sub) {
    el('text', {
      x: node.x, y: node.y + 12,
      'text-anchor': 'middle', 'dominant-baseline': 'middle',
      fill: node.color,
      'font-size': '9px',
      'pointer-events': 'none',
      opacity: '0.8',
    }).textContent = node.sub;
  }
}

function renderTree(node, level = 0, parent = null) {
  if (parent) {
    drawLink(parent.x, parent.y, node.x, node.y, node.color);
  }
  drawNode(node, level);
  if (node.children) {
    node.children.forEach(child => renderTree(child, level + 1, node));
  }
}

renderTree(tree);

// ─── Pan & Zoom ──────────────────────────────────────────────────────────────
let vx = 0, vy = 0, scale = 0.55;
let dragging = false, lastX, lastY;
const wrap = document.getElementById('canvas-wrap');

function applyTransform() {
  g.setAttribute('transform', `translate(${vx},${vy}) scale(${scale})`);
}

// Center on load
function resetView() {
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  scale = 0.55;
  vx = W / 2 - CX * scale;
  vy = H / 2 - CY * scale;
  applyTransform();
}
setTimeout(resetView, 50);

wrap.addEventListener('mousedown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  wrap.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  vx += e.clientX - lastX;
  vy += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; wrap.classList.remove('dragging'); });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const rect   = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  vx = mx - (mx - vx) * factor;
  vy = my - (my - vy) * factor;
  scale *= factor;
  applyTransform();
}, { passive: false });

function zoomIn()  { scale *= 1.2; applyTransform(); }
function zoomOut() { scale *= 0.8; applyTransform(); }
</script>
