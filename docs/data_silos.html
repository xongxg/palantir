<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>数据孤岛</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b0d17;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;
}
</style>
</head>
<body>
<svg width="1000" height="480" viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#151a2e" stroke-width="0.8"/>
  </pattern>

  <!-- HR purple -->
  <linearGradient id="g-hr" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#6d28d9"/>
    <stop offset="100%" stop-color="#3b0764"/>
  </linearGradient>
  <linearGradient id="g-hr-lid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#a78bfa"/>
    <stop offset="100%" stop-color="#7c3aed"/>
  </linearGradient>

  <!-- Finance blue -->
  <linearGradient id="g-fin" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0369a1"/>
    <stop offset="100%" stop-color="#0c4a6e"/>
  </linearGradient>
  <linearGradient id="g-fin-lid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#38bdf8"/>
    <stop offset="100%" stop-color="#0284c7"/>
  </linearGradient>

  <!-- Sales green -->
  <linearGradient id="g-sal" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#047857"/>
    <stop offset="100%" stop-color="#022c22"/>
  </linearGradient>
  <linearGradient id="g-sal-lid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#34d399"/>
    <stop offset="100%" stop-color="#059669"/>
  </linearGradient>

  <!-- IT yellow -->
  <linearGradient id="g-it" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#b45309"/>
    <stop offset="100%" stop-color="#451a03"/>
  </linearGradient>
  <linearGradient id="g-it-lid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#d97706"/>
  </linearGradient>

  <!-- Ops orange -->
  <linearGradient id="g-ops" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#c2410c"/>
    <stop offset="100%" stop-color="#431407"/>
  </linearGradient>
  <linearGradient id="g-ops-lid" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#fb923c"/>
    <stop offset="100%" stop-color="#ea580c"/>
  </linearGradient>

  <!-- Highlight overlay for 3D left-edge effect -->
  <linearGradient id="g-shine" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="white" stop-opacity="0.12"/>
    <stop offset="40%"  stop-color="white" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>

  <!-- Red glow for barriers -->
  <filter id="red-glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Title glow -->
  <filter id="title-glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ── Background ── -->
<rect width="1000" height="480" fill="#0b0d17"/>
<rect width="1000" height="480" fill="url(#grid)"/>

<!-- ── Subtle vignette ── -->
<radialGradient id="vignette" cx="50%" cy="50%" r="70%">
  <stop offset="0%"   stop-color="transparent"/>
  <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
</radialGradient>
<rect width="1000" height="480" fill="url(#vignette)"/>

<!-- ── Title ── -->
<text x="500" y="52" text-anchor="middle"
      fill="#f87171" font-size="26" font-weight="800" letter-spacing="4"
      filter="url(#title-glow)">数据孤岛</text>

  企业各部门数据封闭于独立筒仓，无法互通，形成跨系统数据割裂困境
</text>
