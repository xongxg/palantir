<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Palantir Ingest — Clean UI</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; color: #1f2328; }
    h1 { margin-bottom: 8px; }
    h2 { margin: 18px 0 8px; font-size: 16px; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 6px 10px; border: 1px solid #d0d7de; border-radius: 6px; background: #f6f8fa; cursor: pointer; }
    .btn:active { transform: translateY(1px); }
    .col { display: flex; flex-direction: column; gap: 6px; }
    textarea { width: 100%; height: 200px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    input[type="text"], select { padding: 6px 8px; border: 1px solid #d0d7de; border-radius: 6px; }
    pre { background: #f6f8fa; padding: 10px; border-radius: 6px; overflow: auto; }
    #grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    @media (max-width: 960px) { #grid { grid-template-columns: 1fr; } }
  </style>
  <script>
    const $ = (id) => document.getElementById(id);
    async function json(url, opts={}) { const r = await fetch(url, opts); const t = await r.text(); try { return JSON.parse(t); } catch { return { raw: t }; } }
    async function postJson(url, obj) { return json(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(obj) }); }
    async function postForm(url, fd) { return json(url, { method: 'POST', body: fd }); }

    // Summary & Viz
    async function refreshSummary() {
      const data = await json('/api/live_ontology');
      const s = data.summary || {}; const n = s.total_entities ?? (data.entities||[]).length; const m = s.total_relationships ?? (data.relationships||[]).length;
      $('summary').textContent = `${n} entities · ${m} relationships`;
    }
    function showViz() { const f = $('viz'); if (!f.src) f.src = '/viz'; }
    function refreshViz() { const f = $('viz'); f.src = '/viz?src=/api/live_ontology&ts=' + Date.now(); }

    // Connectors
    async function listConnectors() {
      const j = await json('/api/connectors');
      const sel = $('connector'); sel.innerHTML='';
      (j.items || []).forEach(c => { const o = document.createElement('option'); o.value=c.id; o.textContent = `${c.id} — ${c.path}`; sel.appendChild(o); });
      if (sel.options.length) {
        sel.selectedIndex = 0;
        await autoSuggest();
      }
    }
    async function registerConnector() {
      const body = { path: $('path').value, ns: $('ns').value, schema: $('schema').value };
      const j = await postJson('/api/connectors', body);
      $('log').textContent = JSON.stringify(j,null,2);
      await listConnectors();
    }
    let pendingUploads = [];
    async function renderUploads() {
      const area = $('uploads'); area.innerHTML='';
      pendingUploads.forEach(upload => {
        const row = document.createElement('div'); row.className='row';
        const info = document.createElement('span');
        info.textContent = `${upload.filename} (${upload.path})`;
        const nsInput = document.createElement('input'); nsInput.value = upload.ns || (upload.filename.split('.')[0] || 'csv');
        nsInput.placeholder = 'ns';
        const schemaInput = document.createElement('input'); schemaInput.value = upload.schema || `${nsInput.value}_v1`;
        schemaInput.placeholder = 'schema';
        const btn = document.createElement('button');
        btn.className = 'btn'; btn.textContent = 'Register';
        btn.onclick = async () => {
          const body = { temp_id: upload.tmp_id, ns: nsInput.value, schema: schemaInput.value };
          const res = await postJson('/api/register_upload', body);
          $('log').textContent = JSON.stringify(res,null,2);
          pendingUploads = pendingUploads.filter(u => u.tmp_id !== upload.tmp_id);
          renderUploads();
          await listConnectors();
        };
        row.append(info, nsInput, schemaInput, btn);
        area.appendChild(row);
      });
    }
    async function uploadMulti() {
      const files = $('files').files; if (!files.length) { alert('Choose files'); return; }
      const fd = new FormData(); for (const f of files) fd.append('file', f);
      const j = await postForm('/api/upload_multi', fd);
      pendingUploads = j.uploads || [];
      $('log').textContent = JSON.stringify(j,null,2);
      await renderUploads();
    }

    // Mapping
    async function suggest() {
      const cid = $('connector').value; if (!cid) { alert('Choose connector'); return; }
      const j = await postJson('/api/inspect', { connector_id: cid, limit: 3 });
      const headers = j.headers || []; const samples = j.samples || [];
      if (!headers.length) { alert('No headers'); return; }
      const idField = headers.find(h => h.toLowerCase()==='id') || headers[0];
      const fields = headers.filter(h => h!==idField);
      const pick = (k)=>{ const vs=samples.map(s=> (s[k]??'')+'').slice(0,3); return vs.every(v=>/^[-]?\d+(\.\d+)?$/.test(v))?'float':'str'; };
      const mapLines = fields.map(k => `${k} = "${k}|${pick(k)}"`).join('\n');
      const linkCand = headers.find(h=>h.toLowerCase().endsWith('_id') && h.toLowerCase()!=='id');
      const link = linkCand?`\n[[links]]\nrel = "HAS"\nfrom_key = "${linkCand}"\nto_key = "${idField}"\n`:'';
      const ns = j.ns || 'csv.unknown'; const entity = (j.schema||'Record').replace(/_v\d+$/,'')||'Record';
      $('mapping').value = `version = "v1"\nentity = "${entity}"\n[from]\nns = "${ns}"\n[id]\nfield = "${idField}"\n[map]\n${mapLines}${link}`;
      $('log').textContent = `suggested mapping for ${cid}`;
    }
    async function autoSuggest() {
      const cid = $('connector').value; if (!cid) return;
      const j = await fetch('/api/suggest', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ connector_id: cid })
      }).then(r => r.json());
      if (j.mapping_toml) {
        $('mapping').value = j.mapping_toml;
        $('mappingId').textContent = '(auto)';
        $('log').textContent = `auto-filled mapping for ${cid}`;
      }
    }
    async function saveMapping() { const j = await postJson('/api/mappings', { mapping_toml: $('mapping').value }); $('mappingId').textContent = j.id || '(none)'; }
    async function preview() {
      const body = { connector_id: $('connector').value, mapping_id: $('mappingId').textContent, limit: Number($('limit').value)||5 };
      const j = await postJson('/api/preview', body); $('log').textContent = JSON.stringify(j,null,2);
    }
    async function applyMap() {
      const body = { connector_id: $('connector').value, mapping_id: $('mappingId').textContent };
      const j = await postJson('/api/apply', body); $('log').textContent = JSON.stringify(j,null,2);
      await postJson('/api/discover', {}); await refreshSummary(); refreshViz();
    }
    async function resetLive() { await fetch('/api/reset', { method: 'POST' }); $('log').textContent='reset ok'; $('mappingId').textContent='(none)'; await refreshSummary(); refreshViz(); }

    window.addEventListener('DOMContentLoaded', async ()=>{ await listConnectors(); await refreshSummary(); });
  </script>
</head>
<body>
  <h1>Palantir Ingest — Clean UI</h1>
  <div id="grid">
    <div class="col">
      <h2>1) Upload (Multiple) or Register</h2>
      <div class="row">
        <input type="file" id="files" multiple />
        <button class="btn" onclick="uploadMulti()">Upload Multiple (Auto)</button>
      </div>
      <div id="uploads" style="display:flex;flex-direction:column;gap:6px;margin-top:12px"></div>
      <div class="row">
        <input type="text" id="path" placeholder="path e.g. data/transactions.csv" style="min-width:300px" />
        <input type="text" id="ns" placeholder="ns e.g. csv.transactions" />
        <input type="text" id="schema" placeholder="schema e.g. transactions_v1" />
        <button class="btn" onclick="registerConnector()">Register</button>
      </div>
      <div class="row">
        <button class="btn" onclick="listConnectors()">List Connectors</button>
        <select id="connector" style="min-width:360px"></select>
        <button class="btn" onclick="resetLive()">Reset Live</button>
      </div>

      <h2>2) Mapping</h2>
      <div class="row">
        <button class="btn" onclick="suggest()">Suggest</button>
        <button class="btn" onclick="saveMapping()">Save Mapping</button>
        <span>mapping_id: <code id="mappingId">(none)</code></span>
      </div>
      <textarea id="mapping" placeholder="TOML mapping here..."></textarea>

      <h2>3) Preview & Apply</h2>
      <div class="row">
        <label>limit</label><input type="text" id="limit" value="5" style="width:60px" />
        <button class="btn" onclick="preview()">Preview</button>
        <button class="btn" onclick="applyMap()">Apply</button>
      </div>
      <h2>Log</h2>
      <pre id="log"></pre>
    </div>

    <div class="col">
      <h2>4) Visualize</h2>
      <div class="row">
        <span id="summary" style="opacity:.75">0 entities · 0 relationships</span>
        <button class="btn" onclick="showViz()">Show Viz</button>
        <button class="btn" onclick="refreshViz()">Refresh Viz</button>
      </div>
      <iframe id="viz" src="" style="width:100%;height:720px;border:1px solid #d0d7de;border-radius:6px;background:#fff"></iframe>
    </div>
  </div>
</body>
</html>
