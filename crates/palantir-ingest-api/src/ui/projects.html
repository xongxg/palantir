<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Palantir — Workspace</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
       background: #0f1117; color: #e2e8f0; min-height: 100vh; }

/* ── TopBar ── */
.topbar { background: #1a1d2e; border-bottom: 1px solid #2d3748;
          padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 24px;
          position: sticky; top: 0; z-index: 10; }
.logo { font-size: 15px; font-weight: 700; color: #a78bfa; letter-spacing: -0.3px; flex-shrink: 0; }
.topbar nav { display: flex; gap: 20px; }
.topbar nav a { color: #64748b; text-decoration: none; font-size: 13px; transition: color .15s; }
.topbar nav a:hover { color: #e2e8f0; }
.topbar nav a.active { color: #a78bfa; font-weight: 500; }

/* ── Page header ── */
.content { max-width: 960px; margin: 0 auto; padding: 36px 24px 60px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 600; color: #e2e8f0; }
.page-sub { font-size: 13px; color: #64748b; margin-top: 4px; }

.btn-new { display: flex; align-items: center; gap: 6px; background: #a78bfa;
           color: #0f1117; border: none; border-radius: 8px; padding: 9px 18px;
           font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; flex-shrink: 0; }
.btn-new:hover { background: #8b5cf6; }

/* ── Search ── */
.search-row { margin-bottom: 20px; }
.search-input { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 8px;
                padding: 8px 14px; color: #e2e8f0; font-size: 13px; width: 280px;
                outline: none; transition: border-color .15s; }
.search-input:focus { border-color: #a78bfa; }
.search-input::placeholder { color: #475569; }

/* ── Project grid ── */
.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

.proj-card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px;
             padding: 20px; cursor: pointer; transition: border-color .2s, background .2s;
             display: flex; flex-direction: column; gap: 14px; position: relative; }
.proj-card:hover { border-color: #a78bfa; background: rgba(167,139,250,0.04); }

.proj-card-top { display: flex; align-items: flex-start; gap: 12px; }
.proj-icon { width: 40px; height: 40px; border-radius: 10px;
             background: rgba(167,139,250,0.12);
             display: flex; align-items: center; justify-content: center;
             font-size: 20px; flex-shrink: 0; }
.proj-info { flex: 1; min-width: 0; }
.proj-name { font-size: 15px; font-weight: 600; color: #e2e8f0;
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.proj-updated { font-size: 12px; color: #475569; margin-top: 3px; }

/* status dot */
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.dot-idle    { background: #3d4258; }
.dot-synced  { background: #10b981; }
.dot-syncing { background: #f59e0b; }
.dot-error   { background: #ef4444; }

/* ── Stats row ── */
.proj-stats { display: flex; gap: 16px; padding-top: 4px; border-top: 1px solid #1e2235; }
.stat-item  { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 5px; }
.stat-val   { color: #94a3b8; font-weight: 500; }

/* ── Card actions ── */
.proj-actions { display: flex; gap: 8px; align-items: center; }
.btn-ontology { background: transparent; border: 1px solid #2d3748; border-radius: 6px;
                color: #64748b; font-size: 12px; padding: 5px 12px; cursor: pointer;
                text-decoration: none; transition: border-color .15s, color .15s; }
.btn-ontology:hover { border-color: #a78bfa; color: #a78bfa; }
.btn-enter { background: #a78bfa; border: none; border-radius: 6px;
             color: #0f1117; font-size: 12px; font-weight: 600; padding: 5px 14px;
             cursor: pointer; text-decoration: none; transition: background .15s; }
.btn-enter:hover { background: #8b5cf6; }
.btn-del { background: transparent; border: 1px solid #2d3748; border-radius: 6px;
           color: #475569; font-size: 12px; padding: 5px 10px; cursor: pointer;
           transition: border-color .15s, color .15s; margin-left: auto; }
.btn-del:hover { border-color: #ef4444; color: #ef4444; }

/* ── Status badge ── */
.status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px;
                padding: 3px 8px; border-radius: 20px; font-weight: 500; }
.badge-idle    { background: rgba(61,66,88,.5);   color: #64748b; }
.badge-synced  { background: rgba(16,185,129,.1); color: #10b981; }
.badge-syncing { background: rgba(245,158,11,.1); color: #f59e0b; }
.badge-error   { background: rgba(239,68,68,.1);  color: #ef4444; }

/* ── Empty ── */
.empty { text-align: center; padding: 80px 0; }
.empty-icon { font-size: 56px; margin-bottom: 16px; opacity: .25; }
.empty-text { font-size: 16px; color: #64748b; margin-bottom: 8px; }
.empty-sub  { font-size: 13px; color: #475569; margin-bottom: 24px; }
.btn-new-lg { display: inline-flex; align-items: center; gap: 6px; background: #a78bfa;
              color: #0f1117; border: none; border-radius: 8px; padding: 11px 22px;
              font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-new-lg:hover { background: #8b5cf6; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6);
                 display: flex; align-items: center; justify-content: center; z-index: 50;
                 opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: #1a1d2e; border: 1px solid #3d4258; border-radius: 14px;
         padding: 28px; width: 420px; max-width: 95vw;
         transform: translateY(8px); transition: transform .2s; }
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: 600; color: #e2e8f0; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; color: #94a3b8; font-weight: 500; margin-bottom: 6px; }
.form-group input { width: 100%; background: #0f1117; border: 1px solid #2d3748;
                    border-radius: 7px; padding: 9px 12px; color: #e2e8f0; font-size: 13px;
                    outline: none; transition: border-color .15s; }
.form-group input:focus { border-color: #a78bfa; }
.err-inline { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
.err-inline.show { display: block; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { background: transparent; border: 1px solid #2d3748; border-radius: 7px;
              color: #64748b; padding: 8px 16px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { border-color: #64748b; color: #e2e8f0; }
.btn-confirm { background: #a78bfa; border: none; border-radius: 7px; color: #0f1117;
               padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-confirm:hover { background: #8b5cf6; }
.btn-confirm:disabled { opacity: .4; cursor: not-allowed; }

.spinner { display: inline-block; width: 14px; height: 14px;
           border: 2px solid #a78bfa44; border-top-color: #a78bfa;
           border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">Palantir</span>
  <nav>
    <a href="/" class="active">Workspace</a>
    <a href="/ontology">Ontology</a>
  </nav>
</div>

<div class="content">
  <div class="page-header">
    <div>
      <div class="page-title">Workspace</div>
      <div class="page-sub">选择项目进入数据接入工作流，每个项目是独立的 Ontology 空间</div>
    </div>
    <button class="btn-new" onclick="openModal()">＋ 新建项目</button>
  </div>

  <div class="search-row">
    <input class="search-input" type="text" placeholder="搜索项目名称…" oninput="filter(this.value)">
  </div>

  <div id="list-wrap">
    <div style="padding:60px 0;text-align:center"><span class="spinner"></span></div>
  </div>
</div>

<!-- Create Modal -->
<div class="modal-overlay" id="modal" onclick="closeIfOverlay(event)">
  <div class="modal">
    <div class="modal-title">新建项目</div>
    <div class="form-group">
      <label>项目名称 *</label>
      <input type="text" id="proj-name" placeholder="如：供应链数据平台" maxlength="64"
             oninput="clearErr()" onkeydown="if(event.key==='Enter')doCreate()">
      <span class="err-inline" id="name-err"></span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" id="btn-create" onclick="doCreate()">创建</button>
    </div>
  </div>
</div>

<script>
let allProjects = [];

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const r    = await fetch('/api/projects');
    const data = await r.json();
    allProjects = data.projects || [];
    render(allProjects);
  } catch(e) {
    document.getElementById('list-wrap').innerHTML =
      `<div style="color:#ef4444;padding:40px 0;text-align:center">加载失败：${e.message}</div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(list) {
  const wrap = document.getElementById('list-wrap');
  if (!list.length) {
    wrap.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🗂</div>
        <div class="empty-text">还没有项目</div>
        <div class="empty-sub">创建第一个项目，开始接入数据</div>
        <button class="btn-new-lg" onclick="openModal()">＋ 新建项目</button>
      </div>`;
    return;
  }

  wrap.innerHTML = `<div class="proj-grid">${list.map(cardHtml).join('')}</div>`;
}

function cardHtml(p) {
  const dotCls   = { idle:'dot-idle', synced:'dot-synced', syncing:'dot-syncing', error:'dot-error' }[p.status] || 'dot-idle';
  const badgeCls = { idle:'badge-idle', synced:'badge-synced', syncing:'badge-syncing', error:'badge-error' }[p.status] || 'badge-idle';
  const badgeTxt = { idle:'未同步', synced:'已同步', syncing:'同步中', error:'同步失败' }[p.status] || '未同步';
  const syncTxt  = p.last_sync_at ? '最近同步 ' + relTime(p.last_sync_at) : '从未同步';

  return `
  <div class="proj-card" id="pc-${p.id}" onclick="gotoProject('${p.id}')">
    <div class="proj-card-top">
      <div class="proj-icon">📦</div>
      <div class="proj-info">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-updated">${syncTxt}</div>
      </div>
      <div class="status-dot ${dotCls}" title="${badgeTxt}"></div>
    </div>
    <div class="proj-stats">
      <div class="stat-item">
        <span>Fold</span><span class="stat-val">${p.fold_count ?? 0}</span>
      </div>
      <span class="status-badge ${badgeCls}">${badgeTxt}</span>
    </div>
    <div class="proj-actions" onclick="event.stopPropagation()">
      <a href="/ingest/project/${p.id}" class="btn-enter">进入 →</a>
      <a href="/workspace?project_id=${p.id}" class="btn-ontology">Ontology</a>
      <button class="btn-del" onclick="delProject('${p.id}','${esc(p.name)}')">删除</button>
    </div>
  </div>`;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function filter(q) {
  const filtered = q ? allProjects.filter(p => p.name.toLowerCase().includes(q.toLowerCase())) : allProjects;
  render(filtered);
}

// ── Navigate ──────────────────────────────────────────────────────────────────
function gotoProject(id) { location.href = `/ingest/project/${id}`; }

// ── Create ────────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('proj-name').focus(), 80);
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('proj-name').value = '';
  clearErr();
}
function closeIfOverlay(e) { if (e.target === e.currentTarget) closeModal(); }
function clearErr() {
  const el = document.getElementById('name-err');
  el.textContent = '';
  el.classList.remove('show');
}

async function doCreate() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { showErr('名称不能为空'); return; }
  if (name.length > 64) { showErr('名称最长 64 字符'); return; }

  const btn = document.getElementById('btn-create');
  btn.disabled = true;
  btn.textContent = '创建中…';

  try {
    const r    = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const data = await r.json();
    if (!r.ok) { showErr(data.error || '创建失败'); return; }
    // AC3: 创建后直接进入 Fold 列表
    location.href = `/ingest/project/${data.id}`;
  } catch(e) {
    showErr('网络错误：' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '创建';
  }
}

function showErr(msg) {
  const el = document.getElementById('name-err');
  el.textContent = msg;
  el.classList.add('show');
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function delProject(id, name) {
  if (!confirm(`确定删除项目「${name}」及其所有数据？`)) return;
  try {
    const r = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
    if (!r.ok) { alert('删除失败'); return; }
    allProjects = allProjects.filter(p => p.id !== id);
    render(allProjects);
  } catch(e) { alert('删除失败：' + e.message); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function relTime(ts) {
  const diff = Math.floor(Date.now() / 1000) - parseInt(ts, 10);
  if (isNaN(diff) || diff < 0) return '刚刚';
  if (diff < 60)    return '刚刚';
  if (diff < 3600)  return Math.floor(diff / 60) + ' 分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
  return Math.floor(diff / 86400) + ' 天前';
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

load();
</script>
</body>
</html>
